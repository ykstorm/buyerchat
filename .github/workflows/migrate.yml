name: Deploy migrations (manual)

# Sprint 11.10 (2026-05-04) — operator-gated migration deploy.
# Why manual instead of auto-on-merge: schema changes are
# high-blast-radius. Auto-deploying every prisma/migrations/
# change risks breaking prod if a migration has bugs that
# escaped local testing. Manual trigger means an operator
# explicitly clicks "Run workflow" after verifying the
# migration is safe, types DEPLOY in the confirm field,
# and watches the deploy logs.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
      confirm:
        description: 'Type "DEPLOY" to confirm'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Confirm input must be exactly "DEPLOY" — extra friction
    # against accidental clicks.
    if: github.event.inputs.confirm == 'DEPLOY'

    env:
      DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: List pending migrations (dry run)
        run: npx prisma migrate status

      - name: Deploy migrations
        run: npx prisma migrate deploy

      - name: Verify migration applied
        run: npx prisma migrate status
